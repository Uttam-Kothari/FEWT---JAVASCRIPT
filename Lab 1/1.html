<!doctype html>
<html>
  <head>
    <style>
      div {
        width: 200px;
        height: 100px;
        background-color: red;
        animation: colorChange 4s;
      }

      @keyframes colorChange {
        from {
          background-color: red;
        }
        to {
          background-color: yellow;
        }
      }
    </style>
  </head>
  <body>
    <div></div>
  </body>
</html>
